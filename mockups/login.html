<!doctype html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  ETÉREO · Login — Split Atmosférico                             ║
  ║  Pantalla de inicio de sesión — Código fuente listo para usar   ║
  ║                                                                  ║
  ║  Fuentes: Great Vibes · Cormorant Garamond · Inter              ║
  ║  Stack:   React 18 + Babel (JSX inline, sin build)              ║
  ║                                                                  ║
  ║  Para producción: reemplazá los <input> con los campos de tu    ║
  ║  framework (Next.js, Astro, etc.) y el onSubmit del botón.      ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etéreo · Ingresar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  input { font-family: inherit; }
  input::placeholder { color: #A89880; font-style: normal; opacity: 0.7; }
  button { font-family: inherit; }

  /* ── Design tokens como CSS custom properties ─────────── */
  :root {
    --color-primary:          #4A3728;
    --color-primary-hover:    #3a2a1e;
    --color-secondary:        #C5A059;
    --color-secondary-hover:  #b08a42;
    --color-tertiary:         #F9F5F0;
    --color-neutral:          #8C7E6D;
    --color-neutral-light:    #E8E0D8;
    --color-text-primary:     #2C1F14;
    --color-text-secondary:   #6B5B4E;
    --color-text-muted:       #A89880;
    --color-white:            #FFFFFF;
    --color-error:            #C0392B;
    --color-success:          #27AE60;

    --font-script:  'Great Vibes', cursive;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-ui:      'Inter', system-ui, sans-serif;
  }

  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + Babel (JSX sin build step) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
/* ══════════════════════════════════════════════════════════
   TOKENS — paleta y tipografía
   ══════════════════════════════════════════════════════════ */
const E = {
  primary:        '#4A3728',
  primaryHover:   '#3a2a1e',
  secondary:      '#C5A059',
  secondaryHover: '#b08a42',
  tertiary:       '#F9F5F0',
  neutral:        '#8C7E6D',
  neutralLight:   '#E8E0D8',
  textPrimary:    '#2C1F14',
  textSecondary:  '#6B5B4E',
  textMuted:      '#A89880',
  white:          '#FFFFFF',
  error:          '#C0392B',
  success:        '#27AE60',
  fontScript:  '"Great Vibes", cursive',
  fontDisplay: '"Cormorant Garamond", Georgia, serif',
  fontUI:      '"Inter", system-ui, sans-serif',
};

/* Wordmark reutilizable */
function EtereoMark({ size = 64, color = E.primary, style = {} }) {
  return (
    <span style={{
      fontFamily: E.fontScript, fontSize: size, color,
      lineHeight: 0.95, fontWeight: 400, display: 'inline-block',
      ...style
    }}>Etéreo</span>
  );
}

/* ══════════════════════════════════════════════════════════
   ICONOS
   ══════════════════════════════════════════════════════════ */
const iconMail = (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
    <rect x="3" y="5" width="18" height="14" rx="2"/>
    <path d="M3 7l9 6 9-6"/>
  </svg>
);
const iconLock = (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
    <rect x="4" y="11" width="16" height="10" rx="2"/>
    <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
  </svg>
);
const iconEye = (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
);
const iconGoogle = (
  <svg width="18" height="18" viewBox="0 0 18 18">
    <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
    <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.84.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
    <path fill="#FBBC05" d="M3.96 10.71A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3-2.33z"/>
    <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.96l3 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
  </svg>
);

/* ══════════════════════════════════════════════════════════
   PANEL IZQUIERDO — atmósfera botánica oscura
   ══════════════════════════════════════════════════════════ */
function SplitAtmosphere() {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: `
        radial-gradient(ellipse at 30% 80%, rgba(197,160,89,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 20%, rgba(249,245,240,0.06) 0%, transparent 60%),
        linear-gradient(180deg, #5a4530 0%, #4A3728 60%, #2a1d12 100%)
      `,
      overflow: 'hidden'
    }}>
      {/* Motivo botánico SVG */}
      <svg viewBox="0 0 500 800" preserveAspectRatio="xMidYMid slice"
        style={{ position: 'absolute', top: 0, right: -40, width: '85%', height: '100%', opacity: 0.4 }}>
        <defs>
          <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="rgba(197,160,89,0.6)" />
            <stop offset="100%" stopColor="rgba(197,160,89,0.05)" />
          </linearGradient>
        </defs>
        <g fill="url(#leafGrad)" stroke="rgba(197,160,89,0.4)" strokeWidth="0.6">
          <path d="M 380 -20 Q 360 200 320 420 T 280 820" fill="none" />
          <path d="M 420 -10 Q 410 220 380 460 T 340 820" fill="none" />
          <path d="M 460 10 Q 470 240 450 480 T 420 820" fill="none" />
          {Array.from({ length: 24 }).map((_, i) => {
            const y = 40 + i * 32;
            const x = 360 + Math.sin(i * 0.5) * 50;
            const rot = -30 + (i % 2 ? 60 : -20);
            return <ellipse key={i} cx={x} cy={y} rx="6" ry={28 + i % 3 * 6} transform={`rotate(${rot} ${x} ${y})`} />;
          })}
          {Array.from({ length: 18 }).map((_, i) => {
            const y = 100 + i * 38;
            const x = 440 + Math.cos(i * 0.7) * 30;
            const rot = 20 + (i % 2 ? -50 : 70);
            return <ellipse key={'b' + i} cx={x} cy={y} rx="5" ry={24 + i % 3 * 5} transform={`rotate(${rot} ${x} ${y})`} />;
          })}
        </g>
      </svg>
      {/* Vignette superior */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, height: 200,
        background: 'linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%)',
        pointerEvents: 'none'
      }} />
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   CAMPO DE FORMULARIO
   ══════════════════════════════════════════════════════════ */
function SplitInput({ label, type = 'text', placeholder, icon, trailing }) {
  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{
        fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
        color: E.textSecondary, marginBottom: 10, fontFamily: E.fontUI, fontWeight: 500
      }}>{label}</div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: `1px solid ${E.neutral}`, paddingBottom: 12
      }}>
        {icon && <span style={{ color: E.textMuted, display: 'flex' }}>{icon}</span>}
        <input
          type={type}
          placeholder={placeholder}
          style={{
            flex: 1, border: 'none', outline: 'none', background: 'transparent',
            fontSize: 15, color: E.textPrimary, fontFamily: E.fontUI, padding: 0
          }}
        />
        {trailing}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LOGIN SPLIT — componente principal
   ══════════════════════════════════════════════════════════ */
function LoginSplit() {
  const [showPass, setShowPass] = React.useState(false);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'grid', gridTemplateColumns: '1.05fr 1fr',
      background: E.tertiary, color: E.textPrimary, fontFamily: E.fontUI
    }}>

      {/* ── Panel izquierdo: atmósfera ─────────────────── */}
      <div style={{ position: 'relative', overflow: 'hidden', color: E.tertiary }}>
        <SplitAtmosphere />

        {/* Centro: wordmark + frase */}
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%)',
          textAlign: 'center', width: '100%', padding: '0 40px'
        }}>
          <EtereoMark size={168} color={E.tertiary} style={{ textShadow: '0 4px 30px rgba(0,0,0,0.5)' }} />
          <div style={{
            marginTop: 18, fontSize: 12, letterSpacing: '0.42em',
            textTransform: 'uppercase', color: E.secondary, opacity: 0.95,
            fontFamily: E.fontUI, fontWeight: 500
          }}>belleza · cuidado · bienestar</div>
          <div style={{
            marginTop: 40, maxWidth: 400, marginLeft: 'auto', marginRight: 'auto',
            fontSize: 18, lineHeight: 1.7, color: E.tertiary, opacity: 0.78,
            fontStyle: 'italic', fontWeight: 300, fontFamily: E.fontDisplay
          }}>
            "Un refugio donde el tiempo se detiene y el cuidado se vuelve un acto de amor propio."
          </div>
        </div>

        {/* Pie izquierdo */}
        <div style={{
          position: 'absolute', bottom: 36, left: 44, right: 44,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          fontSize: 10, letterSpacing: '0.25em', textTransform: 'uppercase',
          color: E.tertiary, opacity: 0.55, fontFamily: E.fontUI, fontWeight: 500
        }}>
          <span>Moreno 212 · 1° A</span>
          <span>@etereo.salondebelleza</span>
        </div>
      </div>

      {/* ── Panel derecho: formulario ──────────────────── */}
      <div style={{
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: '0 88px', position: 'relative'
      }}>

        {/* Volver */}
        <div style={{
          position: 'absolute', top: 36, right: 44,
          fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
          color: E.textSecondary, cursor: 'pointer', fontWeight: 500
        }}>
          ← Volver al inicio
        </div>

        <div style={{ maxWidth: 420, width: '100%' }}>

          {/* Eyebrow */}
          <div style={{
            fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase',
            color: E.secondary, marginBottom: 22, fontWeight: 600,
            display: 'flex', alignItems: 'center', gap: 10
          }}>
            <span style={{ display: 'inline-block', width: 18, height: 1, background: E.secondary }} />
            Iniciar sesión
          </div>

          {/* Título */}
          <h1 style={{
            fontFamily: E.fontDisplay, fontSize: 56, margin: 0,
            color: E.textPrimary, lineHeight: 1.05, fontWeight: 400, letterSpacing: '-0.01em'
          }}>Bienvenido<span style={{ color: E.secondary }}>.</span></h1>
          <p style={{
            fontSize: 15, color: E.textSecondary, marginTop: 12, marginBottom: 44,
            fontWeight: 400, lineHeight: 1.6
          }}>
            Nos alegra volver a verte. Ingresá para gestionar tus turnos y bonos.
          </p>

          {/* Campos */}
          <SplitInput
            label="Correo electrónico"
            type="email"
            placeholder="tu@email.com"
            icon={iconMail}
          />
          <SplitInput
            label="Contraseña"
            type={showPass ? 'text' : 'password'}
            placeholder="••••••••"
            icon={iconLock}
            trailing={
              <span
                onClick={() => setShowPass(p => !p)}
                style={{ color: E.textMuted, cursor: 'pointer', display: 'flex' }}
              >{iconEye}</span>
            }
          />

          {/* Recordarme + recuperar */}
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginTop: 4, marginBottom: 36
          }}>
            <label style={{
              display: 'flex', alignItems: 'center', gap: 10,
              fontSize: 13, color: E.textSecondary, cursor: 'pointer'
            }}>
              <span style={{
                width: 16, height: 16, border: `1.5px solid ${E.neutral}`, borderRadius: 3,
                display: 'inline-block', background: E.white
              }} />
              Recordarme
            </label>
            <span style={{
              fontSize: 13, color: E.primary, cursor: 'pointer', fontWeight: 500,
              borderBottom: `1px solid ${E.primary}`, paddingBottom: 1
            }}>¿Olvidaste tu contraseña?</span>
          </div>

          {/* CTA principal */}
          <button
            onClick={() => alert('→ Conectar con tu sistema de autenticación')}
            style={{
              width: '100%', background: E.primary, color: E.tertiary,
              border: 'none', padding: '18px',
              fontSize: 12, letterSpacing: '0.28em', textTransform: 'uppercase',
              cursor: 'pointer', fontFamily: E.fontUI, fontWeight: 600
            }}
          >Ingresar</button>

          {/* Separador */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 16, margin: '32px 0',
            fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: E.textMuted, fontWeight: 500
          }}>
            <span style={{ flex: 1, height: 1, background: E.neutralLight }} />
            <span>O continuá con</span>
            <span style={{ flex: 1, height: 1, background: E.neutralLight }} />
          </div>

          {/* Google */}
          <button
            onClick={() => alert('→ Conectar con Google OAuth')}
            style={{
              width: '100%', background: E.white, color: E.textPrimary,
              border: `1px solid ${E.neutralLight}`, padding: '16px',
              fontSize: 13, cursor: 'pointer', fontFamily: E.fontUI,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
              fontWeight: 500
            }}
          >
            {iconGoogle}
            Continuar con Google
          </button>

          {/* Registro */}
          <div style={{
            textAlign: 'center', marginTop: 40, fontSize: 14, color: E.textSecondary
          }}>
            ¿Es tu primera vez en <EtereoMark size={20} color={E.primary} style={{ verticalAlign: 'baseline' }} />?{' '}
            <span style={{
              color: E.primary, cursor: 'pointer', fontWeight: 600,
              borderBottom: `1px solid ${E.primary}`, paddingBottom: 1
            }}>Creá tu cuenta</span>
          </div>

        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<LoginSplit />);
</script>
</body>
</html>
